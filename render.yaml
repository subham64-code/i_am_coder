# Render deployment for I AM CODER backend (Express + Prisma)
# Set these as environment variables / secret files in the Render dashboard.

services:
  - type: web
    name: iamcoder-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: MYSQL_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: CLIENT_URL
        value: https://iamcoder.vercel.app
      - key: API_PREFIX
        value: /api/v1

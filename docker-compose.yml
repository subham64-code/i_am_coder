version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: iamcoder-server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - iamcoder

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: iamcoder-client
    env_file:
      - ./client/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - iamcoder

  mongo:
    image: mongo:7
    container_name: iamcoder-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - iamcoder

  mysql:
    image: mysql:8
    container_name: iamcoder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: iamcoder
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - iamcoder

  redis:
    image: redis:7-alpine
    container_name: iamcoder-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - iamcoder

volumes:
  mongo-data:
  mysql-data:

networks:
  iamcoder:
    driver: bridge

# I AM CODER — full stack via Docker (local dev / self-host)
# Build context for both services is the repository root so the workspace Dockerfiles work.
# Run: docker compose up --build   (then open http://localhost:3000)

services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: iamcoder-server
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mongodb://mongo:27017/iamcoder
      MYSQL_URL: mysql://root:rootpassword@mysql:3306/iamcoder
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker_dev_jwt_secret_change_me
      JWT_REFRESH_SECRET: docker_dev_refresh_secret_change_me
      ADMIN_EMAILS: subhambehera4431@gmail.com,subhambehera89418@gmail.com
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      BREVO_API_KEY: ""
      MAIL_FROM: I AM CODER <subhambehera2023@gift.edu.in>
      CLIENT_URL: http://localhost:3000
      API_PREFIX: /api/v1
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - iamcoder

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: iamcoder-client
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - iamcoder

  mongo:
    image: mongo:7
    container_name: iamcoder-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - iamcoder

  mysql:
    image: mysql:8
    container_name: iamcoder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: iamcoder
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - iamcoder

  redis:
    image: redis:7-alpine
    container_name: iamcoder-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - iamcoder

volumes:
  mongo-data:
  mysql-data:

networks:
  iamcoder:
    driver: bridge

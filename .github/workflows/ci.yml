name: I AM CODER CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint --workspace client
      - run: npm run typecheck --workspace client
      - run: npm run build --workspace client

  server:
    name: Server (Express)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint --workspace server
      - run: npm run typecheck --workspace server
      - run: npm run build --workspace server
